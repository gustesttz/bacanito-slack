name: Lembretes de Água Automáticos

on:
  schedule:
    # 10h BRT = 13h UTC (seg-sex)
    - cron: '0 13 * * 1-5'
    # 15h BRT = 18h UTC (seg-sex)
    - cron: '0 18 * * 1-5'
  workflow_dispatch:  # Permite trigger manual

jobs:
  enviar-lembrete:
    runs-on: ubuntu-latest
    steps:
      - name: 💧 Trigger lembrete de água
        run: |
          curl -X GET https://bacanito-slack.onrender.com/trigger-lembrete-agua
          echo "✅ Lembrete enviado com sucesso!"
